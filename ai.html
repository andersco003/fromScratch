<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
}

h1{
    margin-top:20px;
}

#controls{
    margin:15px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

#game{
    display:grid;
    grid-template-columns: repeat(10,40px);
    grid-template-rows: repeat(10,40px);
    gap:2px;
    justify-content:center;
}

.cell{
    width:40px;
    height:40px;
    background:#bbb;
    border:1px solid #888;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.revealed{
    background:#e0e0e0;
    cursor:default;
}

.mine{
    background:#ff4d4d;
}

.flag{
    background:#ffd24d;
}

#message{
    font-size:22px;
    margin-top:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Minesweeper</h1>

<div id="controls">
<button onclick="startGame()">Start Game</button>
<button onclick="startGame()">Restart Game</button>
</div>

<div id="game"></div>

<div id="message"></div>

<script>

const gridSize = 10;
const mineCount = 15;

let board=[];
let gameActive=false;

function startGame(){

    const game=document.getElementById("game");
    const message=document.getElementById("message");

    game.innerHTML="";
    message.textContent="";
    board=[];
    gameActive=true;

    for(let r=0;r<gridSize;r++){
        board[r]=[];

        for(let c=0;c<gridSize;c++){

            const cell=document.createElement("div");
            cell.classList.add("cell");

            cell.addEventListener("click",()=>handleLeftClick(r,c));
            cell.addEventListener("contextmenu",(e)=>{
                e.preventDefault();
                handleRightClick(r,c);
            });

            game.appendChild(cell);

            board[r][c]={
                mine:false,
                revealed:false,
                flagged:false,
                element:cell
            };
        }
    }

    placeMines();
}

function placeMines(){

    let placed=0;

    while(placed<mineCount){

        let r=Math.floor(Math.random()*gridSize);
        let c=Math.floor(Math.random()*gridSize);

        if(!board[r][c].mine){
            board[r][c].mine=true;
            placed++;
        }
    }
}

function handleLeftClick(r,c){

    if(!gameActive) return;

    const cell=board[r][c];

    if(cell.revealed || cell.flagged) return;

    if(cell.mine){

        cell.element.textContent="💣";
        cell.element.classList.add("mine");
        endGame(false);
        return;

    }

    revealCell(r,c);
    checkWin();
}

function handleRightClick(r,c){

    if(!gameActive) return;

    const cell=board[r][c];

    if(cell.revealed) return;

    cell.flagged=!cell.flagged;

    if(cell.flagged){
        cell.element.textContent="🚩";
        cell.element.classList.add("flag");
    }else{
        cell.element.textContent="";
        cell.element.classList.remove("flag");
    }
}

function revealCell(r,c){

    const cell=board[r][c];

    if(cell.revealed || cell.flagged) return;

    cell.revealed=true;
    cell.element.classList.add("revealed");

    const count=countMines(r,c);

    if(count>0){
        cell.element.textContent=count;
        return;
    }

    for(let dr=-1;dr<=1;dr++){
        for(let dc=-1;dc<=1;dc++){

            const nr=r+dr;
            const nc=c+dc;

            if(nr>=0 && nr<gridSize && nc>=0 && nc<gridSize){
                if(!board[nr][nc].revealed){
                    revealCell(nr,nc);
                }
            }
        }
    }
}

function countMines(r,c){

    let count=0;

    for(let dr=-1;dr<=1;dr++){
        for(let dc=-1;dc<=1;dc++){

            const nr=r+dr;
            const nc=c+dc;

            if(nr>=0 && nr<gridSize && nc>=0 && nc<gridSize){
                if(board[nr][nc].mine) count++;
            }
        }
    }

    return count;
}

function endGame(win){

    gameActive=false;

    const message=document.getElementById("message");

    if(win){
        message.textContent="You Win!";
    }else{
        message.textContent="You Lose!";
        revealMines();
    }
}

function revealMines(){

    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){

            if(board[r][c].mine){
                board[r][c].element.textContent="💣";
                board[r][c].element.classList.add("mine");
            }
        }
    }
}

function checkWin(){

    let safeCells=gridSize*gridSize-mineCount;
    let revealed=0;

    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){

            if(board[r][c].revealed && !board[r][c].mine){
                revealed++;
            }
        }
    }

    if(revealed===safeCells){
        endGame(true);
    }
}

</script>

</body>
</html>
